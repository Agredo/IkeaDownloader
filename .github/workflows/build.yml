name: Build

on:
  push:
    branches: [master]
    tags:     ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os:       windows-latest
            rid:      win-x64
            artifact: ikea-dl.exe

          - os:       ubuntu-latest
            rid:      linux-x64
            artifact: ikea-dl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install native AOT build dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        run: >
          dotnet publish IkeaDownloader.Console/IkeaDownloader.Console.csproj
          -r ${{ matrix.rid }}
          -c Release
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ikea-dl-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create rolling latest release (master push)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          body: "Automatically built from the latest commit on `master`."
          files: 
            artifacts/ikea-dl-win-x64/ikea-dl.exe
            artifacts/ikea-dl-linux-x64/ikea-dl

      - name: Create versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/ikea-dl-win-x64/ikea-dl.exe
            artifacts/ikea-dl-linux-x64/ikea-dl

